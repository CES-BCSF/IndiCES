    <circle cx="48" cy="-8" r="4" fill="#D4A017"/>
    <circle cx="72" cy="-40" r="4" fill="#D4A017"/>

    <!-- Upward arrow -->
    <!-- <path d="M94 -82 L101 -95 L108 -82" fill="none" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/> -->

