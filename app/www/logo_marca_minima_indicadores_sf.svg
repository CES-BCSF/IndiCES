<svg xmlns="http://www.w3.org/2000/svg" viewBox="-35 -5 305 165">

  <g transform="translate(115, 100)">

    <!-- Left cables -->
    <line x1="-100" y1="-90" x2="-145" y2="-30" stroke="#C03030" stroke-width="1.2"/>
    <line x1="-100" y1="-90" x2="-145" y2="0" stroke="#C03030" stroke-width="1.2"/>
    <line x1="-100" y1="-90" x2="-145" y2="30" stroke="#C03030" stroke-width="1.2"/>

