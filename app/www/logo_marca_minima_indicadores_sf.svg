    <line x1="100" y1="-90" x2="145" y2="0" stroke="#4A90C4" stroke-width="1.2"/>
    <line x1="100" y1="-90" x2="145" y2="30" stroke="#4A90C4" stroke-width="1.2"/>

    <!-- Left tower — Rojo -->
